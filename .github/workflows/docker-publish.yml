name:  Construir y Subir API a Docker Hub

on:
  push:
    branches:
      - main
    paths:
      - 'app/**' 

jobs:
  build-and-push:
    runs-on: ubuntu-latest 

    steps:
      - name: 1. Descargar mi código
        uses: actions/checkout@v3

      - name: 2. Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 3. Construir y Subir Imagen
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend-usuarios-go:latest
